<!DOCTYPE html>
<!-- Tell the browser this file is HTML5 -->
<html lang="en">
<head>
  <!-- Document metadata lives inside the head -->
  <meta charset="UTF-8" />
  <!-- Use UTF-8 character encoding so text displays correctly -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Make the page responsive on mobile devices -->
  <title>Garden Plot Starter</title>
  <!-- The browser tab title -->
  <link rel="stylesheet" href="styles.css" />
  <!-- Link to the external CSS file that styles this page -->
</head>
<body>
  <!-- Page content visible to the user goes inside the body -->
  <div class="page">
    <aside class="sidebar">
      <div class="sidebar-card">
        <h2>Seeds</h2>
        <p>Choose a seed, then click a dirt plot to plant it.</p>
        <ul id="seedList" class="seed-list"></ul>
      </div>

      <div class="sidebar-card">
        <h3>Selected seed</h3>
        <p id="selectedSeed">Nothing selected yet.</p>
        <p id="selectedCount"></p>
      </div>
    </aside>

    <main class="garden">
      <header class="garden-header">
        <div>
          <h1>Garden Plot</h1>
          <p>8 × 8 dirt grid. Click a seed, then plant it on a plot.</p>
        </div>
      </header>

      <section id="gardenGrid" class="grid"></section>
    </main>
  </div>

  <footer>
    <!-- Footer content appears at the bottom of the page -->
    <p>Grow your first garden one seed at a time.</p>
  </footer>

  <!-- Load the external JavaScript file after the page content -->
  <script src="script.js"></script>
</body>
</html>
