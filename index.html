<!DOCTYPE html>
<!-- Tell the browser this file is HTML5 -->
<html lang="en">
<head>
  <!-- Document metadata lives inside the head -->
  <meta charset="UTF-8" />
  <!-- Use UTF-8 character encoding so text displays correctly -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Make the page responsive on mobile devices -->
  <title>Blank Website Starter</title>
  <!-- The browser tab title -->
  <link rel="stylesheet" href="styles.css" />
  <!-- Link to the external CSS file that styles this page -->
</head>
<body>
  <!-- Page content visible to the user goes inside the body -->
  <header>
    <!-- A header section for the main page title and intro text -->
    <h1>Welcome to Your Blank Website</h1>
    <p>This is a simple starter page with HTML, CSS, and JavaScript.</p>
  </header>

  <main>
    <!-- The main content area of the page -->
    <section class="card">
      <!-- A reusable section styled as a card in CSS -->
      <h2>Get started</h2>
      <p>Open <code>index.html</code> and begin customizing your page.</p>
      <!-- The button below is accessed from JavaScript using its id -->
      <button id="actionButton">Click Me</button>
      <!-- Empty paragraph that JavaScript will update with a message -->
      <p id="message"></p>
    </section>
  </main>

  <footer>
    <!-- Footer content appears at the bottom of the page -->
    <p>Built with a clean starter template.</p>
  </footer>

  <!-- Load the external JavaScript file after the page content -->
  <script src="script.js"></script>
</body>
</html>
